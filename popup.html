<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拼音标注</title>
  <link rel="stylesheet" href="./src/popup/popup.css" />
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h1>🔤 拼音标注</h1>
    </header>

    <main class="popup-body">
      <button id="btn-toggle" class="btn btn-primary">
        <span id="btn-icon">📝</span>
        <span id="btn-label">标注全页</span>
      </button>

      <div class="status-bar">
        <span class="status-dot" id="status-dot"></span>
        <span id="status-text">未标注</span>
      </div>
    </main>

    <footer class="popup-footer">
      <small>点击拼音可听取发音</small>
    </footer>
  </div>

  <script type="module" src="./src/popup/popup.ts"></script>
</body>
</html>
